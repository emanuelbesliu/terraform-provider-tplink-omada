name: Release

on:
  push:
    tags:
      - "v*"
  workflow_call:
    secrets:
      GPG_PRIVATE_KEY:
        required: true
      PASSPHRASE:
        required: true

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ".go-version"

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          # Pin to v2.14.x — v2.15.0 has a regression where the .sig file hash
          # is appended to SHA256SUMS after GPG signing, invalidating the signature.
          # See: https://github.com/goreleaser/goreleaser/releases/tag/v2.15.0
          version: "~> v2.14"
          args: release --clean
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
