name: Bug Report
description: Report a bug with the Omada Terraform provider
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the information below to help us investigate.

  - type: input
    id: terraform-version
    attributes:
      label: Terraform Version
      description: Output of `terraform version`
      placeholder: "1.12.0"
    validations:
      required: true

  - type: input
    id: provider-version
    attributes:
      label: Provider Version
      description: Version of the omada provider
      placeholder: "0.1.3"
    validations:
      required: true

  - type: input
    id: omada-version
    attributes:
      label: Omada Controller Version
      description: Version of your Omada Software Controller
      placeholder: "6.0.x"
    validations:
      required: true

  - type: textarea
    id: terraform-config
    attributes:
      label: Terraform Configuration
      description: The relevant Terraform configuration (please redact any sensitive values)
      render: hcl
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or relevant log output.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: List the steps to reproduce the issue
      value: |
        1. `terraform apply`
        2. ...
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other relevant information (debug logs, screenshots, etc.)
    validations:
      required: false
