name: Feature Request
description: Suggest a new feature or enhancement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature. Please describe your use case so we can evaluate the request.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the feature you'd like to see
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why do you need this feature? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: proposed-config
    attributes:
      label: Proposed Terraform Configuration
      description: If applicable, show what the Terraform configuration would look like
      render: hcl
    validations:
      required: false

  - type: dropdown
    id: resource-type
    attributes:
      label: Resource Type
      description: Which resource or area does this relate to?
      options:
        - omada_site
        - omada_network
        - omada_wireless_network
        - omada_wlan_group
        - omada_port_profile
        - omada_site_settings
        - omada_device_ap
        - omada_device_switch
        - Data Sources
        - Provider Configuration
        - New Resource
        - Other
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other relevant information
    validations:
      required: false
